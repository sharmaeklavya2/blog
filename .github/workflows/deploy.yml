name: deploy-to-github-pages
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: sharmaeklavya2/MFPelicanTheme
          path: theme
      - run: sudo apt-get install -y graphviz ffmpeg
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: pip
      - run: pip install -r requirements.txt
      - run: pelican --theme=theme
        env:
          PELICAN_PUBLISH: '1'
      - uses: actions/upload-pages-artifact@v5
        with:
          path: output
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: '${{ steps.deployment.outputs.page_url }}'
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
